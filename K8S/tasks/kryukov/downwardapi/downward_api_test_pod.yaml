apiVersion: v1
kind: Pod
metadata:
  name: downward-api-demo-env
  labels:
    app.kubernetes.io/name: downward-demo-env
    app.kubernetes.io/instance: test
    app.kubernetes.io/version: v0.0.1
spec:
  containers:
    - name: main
      image: busybox:1.37
      command:
        - sh
        - -c
      args:
        - |
          echo "-------";
          echo "Pod Name: $POD_NAME";
          echo "Pod Namespace: $POD_NAMESPACE";
          echo "Pod IP: $POD_IP";
          echo "Node name: $NODE_NAME";
          echo "App Label: $APP_LABEL";
          sleep infinity
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: APP_LABEL
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['app.kubernetes.io/instance']
      resources:
        limits:
          cpu: "200m"
          memory: "64Mi"
        requests:
          cpu: "200m"
          memory: "32Mi"
  restartPolicy: Never